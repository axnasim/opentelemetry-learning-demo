# FOSSA Scanning: Automates license compliance and dependency vulnerability analysis.
# This ensures all third-party libraries used in the demo are compatible with 
# the Apache-2.0 license and free of known security flaws.
name: FOSSA scanning

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fossa:
    name: FOSSA scan
    # Only run on the main repository to protect the API secret and 
    # focus auditing on the authoritative codebase.
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      # Executes the scan and uploads results to the FOSSA dashboard.
      - name: Run FOSSA scan
        uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3  # v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          team: OpenTelemetry
