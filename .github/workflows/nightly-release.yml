# Runs once a day at midnight to ensure the 'nightly' tagged images 
# in GHCR and Docker Hub are always up to date with the main branch.
name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  build_and_push_images:
    # Forces a build of all components and tags them as 'nightly'.
    permissions:  # required by the reusable workflow
      contents: read  # required by the component-build-images reusable workflow
      packages: write  # required to push built images to GHCR
    uses: ./.github/workflows/component-build-images.yml
    if: ${{ !github.event.repository.fork }}
    with:
      push: true
      force_build: true
      version: nightly
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
