# A simple trigger workflow that calls the reusable component-build-images workflow
# whenever code is pushed to the main branch or a PR is updated.
name: Test image generation

on:
  push:
    paths:
      - 'src/**'
      - 'test/**'

permissions:
  contents: read

jobs:
  build_images:
    name: Build images
    permissions:
      contents: read  # required by the component-build-images reusable workflow
      packages: write  # required to push built images to GHCR
    if: ${{ !github.event.repository.fork }}
    uses: ./.github/workflows/component-build-images.yml
    # Note: No 'with' section means it uses the default inputs defined in the reusable workflow.
