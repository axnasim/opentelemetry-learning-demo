# This workflow automatically applies labels to Pull Requests based on which files were modified.
# It helps maintainers identify if documentation or Helm chart updates are required
# when core configuration or infrastructure files are changed.
name: Label Pull Requests

on:
  # pull_request_target allows the workflow to run with 'write' permissions 
  # to apply labels even for PRs coming from forks.
  pull_request_target:  # zizmor: ignore[dangerous-triggers] needed to label PRs from forks without checking out PR code
    types: [opened, synchronize, reopened]

permissions:
  contents: read

# Limits concurrency so that multiple pushes to the same PR don't result 
# in redundant labeling jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  label:
    name: Label pull request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # required to add PR labels
      contents: read  # required to inspect repository paths
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Defines path-based filters to determine which labels to apply.
      - name: Check for changed files
        id: file_changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          list-files: shell
          filters: |
            docsUpdateRequired:
              - 'src/flagd/**'
            helmUpdateRequired:
              - '.env'
              - 'compose*.yaml'
              - 'src/flagd/**'
              - 'src/grafana/**'
              - 'src/jaeger/**'
              - 'src/otel-collector/**'
              - 'src/postgresql/**'
              - 'src/prometheus/**'

      # Uses a script to apply the labels via the GitHub API.
      - name: Apply labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const labels = [];
            if ('${{ steps.file_changes.outputs.docsUpdateRequired }}' === 'true') labels.push('docs-update-required');
            if ('${{ steps.file_changes.outputs.helmUpdateRequired }}' === 'true') labels.push('helm-update-required');
            
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }
